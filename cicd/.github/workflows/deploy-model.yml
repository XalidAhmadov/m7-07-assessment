name: deploy-model

# RecoServe CI/CD. Builds the model-AGNOSTIC service image, scans it, and promotes a
# model VERSION through environments. Image tags: recsys-ranker:<semver>-<git-sha>.
# Model versions: ranker-vMAJOR.MINOR.PATCH (registry-resolved, never baked) — see ADR-0002.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      model_version:
        description: "Model version to promote to production (e.g. ranker-v2.4.1)"
        required: true

permissions:
  contents: read
  id-token: write          # OIDC to cloud + registry, no long-lived secrets
  packages: write

env:
  IMAGE_NAME: recsys-ranker
  REGISTRY: ghcr.io/example/recoserve

jobs:
  # 1. Quality gates -----------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Unit tests
        run: pytest -q
      - name: Lint OpenAPI contract (must be lint-clean)
        run: npx --yes @redocly/cli lint api/openapi.yaml
      - name: Validate SLO / alerts / registry YAML
        run: |
          python -c "import yaml,sys; [yaml.safe_load(open(f)) for f in \
            ['serving/slos.yaml','monitoring/alerts.yaml','lifecycle/model-registry.yaml']]"

  # 2. Build + scan (dependency-chained on tests) ------------------------------------------
  build-and-scan:
    needs: lint-and-test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute tag recsys-ranker:<semver>-<git-sha>
        id: meta
        run: |
          SEMVER="${GITHUB_REF_NAME#v}"
          [ "$GITHUB_REF_TYPE" = "tag" ] || SEMVER="0.0.0"
          echo "tag=${SEMVER}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build image (model-agnostic; no weights baked)
        run: docker build -t "$REGISTRY/$IMAGE_NAME:${{ steps.meta.outputs.tag }}" container/
      - name: "Security scan (gate: fail on CRITICAL/HIGH)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Push image
        run: docker push "$REGISTRY/$IMAGE_NAME:${{ steps.meta.outputs.tag }}"

  # 3. Verify model artifact exists & integrity (chained on build) -------------------------
  verify-model-artifact:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve model version + verify registry digest
        run: |
          MV="${{ github.event.inputs.model_version || 'ranker-v2.4.1' }}"
          echo "Verifying $MV exists in registry with matching SHA-256 digest"
          python scripts/verify_registry_digest.py --model-version "$MV"

  # 4. Deploy to staging (auto) ------------------------------------------------------------
  deploy-staging:
    needs: [build-and-scan, verify-model-artifact]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Roll out image + mount model version
        run: |
          ./deploy.sh --env staging \
            --image "$REGISTRY/$IMAGE_NAME:${{ needs.build-and-scan.outputs.image_tag }}" \
            --model-version "${{ github.event.inputs.model_version || 'ranker-v2.4.1' }}"
      - name: Smoke + load gate (must meet 120ms p95 @ baseline)
        run: ./scripts/run_smoke_loadtest.sh --target staging --rps 100

  # 5. Deploy to production (env-gated: requires manual approval) ---------------------------
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production          # GitHub environment protection rule => required reviewers
    steps:
      - uses: actions/checkout@v4
      - name: Canary 5% then progressive rollout
        run: |
          ./deploy.sh --env production --strategy canary --canary-percent 5 \
            --image "$REGISTRY/$IMAGE_NAME:${{ needs.build-and-scan.outputs.image_tag }}" \
            --model-version "${{ github.event.inputs.model_version || 'ranker-v2.4.1' }}"
      - name: Watch burn-rate during canary (auto-abort on alert)
        run: ./scripts/watch_burn_rate.sh --window 15m --abort-on fast_burn
      - name: Promote to 100%
        run: ./deploy.sh --env production --strategy promote
